<!-- Design a student registration form using HTML and CSS that collects user
information such as username, email, password, age, gender, course and
acceptance of terms and conditions. Use CSS to style the form elements including
text fields, radio buttons, dropdown lists and checkboxes to make the form
visually appealing and user-friendly. Apply layout techniques such as spacing,
alignment, borders, background colors and font styling to organize the form in a
structured manner. Ensure that form validation messages and required fields are
clearly visible and highlight the input fields when focused. As a challenge, use
CSS to display a message box or style the alert area that appears if the user’s
age is less than 16 and apply hover or focus effects on the submit button to
indicate interactivity. -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student registration form</title>
    <link rel="stylesheet" href="formstyle.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <h1 id="form-title">Student Registration Form</h1>
    <form id="form">
      <label for="Username" id="usernamefield">Username:</label>
      <br />
      <input type="text" required pattern="[A-Za-z\s]{6,50}" id="username" />
      <!-- regex pattern -->
      <br />
      <br />
      <label for="Email">Email:</label>
      <br />
      <input type="email" required />
      <br />
      <br />
      <label for="Password">Password:</label>
      <br />
      <input type="password" required pattern=".{6,}" />
      <!-- regex pattern j sukai accept garx -->
      <br />
      <br />
      <label for="Age">Age:</label>
      <br />

      <input type="number" id="age" />
      <span id="display-log">❌The age should be greater than 16</span>
      <br />
      <br />

      <label for="Gender">Gender:</label>
      <div class="gender-radio-section">
        <br />
        <input type="radio" name="gender" value="male" id="male" />
        <label for="male">Male</label>
        <input type="radio" name="gender" value="female" id="female" />
        <label for="female">Female</label>
        <input type="radio" name="gender" value="other" id="required" />
        <label for="other">Other</label>
      </div>

      <br />
      <br />
      <label for="Hobbies:" id="hobbies_checkbox_section">Hobbies:</label>
      <div class="hobby_checkbox_selection">
        <input type="checkbox" name="reading" id="reading" />
        <label for="reading">Reading</label>
        <input type="checkbox" name="writing" id="writing" />
        <label for="writing">Writing</label>

        <input type="checkbox" name="singing" id="singing" />
        <label for="singing">Singing</label>

      </div>

      <br />
      <br />
      <label for="select course">Select course:</label>
      <select name="course" id="course" required>
        <option value="math">math</option>
        <option value="science">science</option>
        <option value="physics">physics</option>
        <option value="social">social</option>
      </select>

      <br />
      <br />
      <div class="terms-and_conditions">
        <input type="checkbox" name="terms" id="terms-checkbox" required />
        <label for="terms" id="terms">
          I have read the terms and conditions
        </label>
      </div>
      <br />
      <br />
      <button type="submit">Register</button>
      <div id="success-message" class="success-message">
  ✓ Form submitted successfully!!!
</div>
    </form>
    
  </body>
</html>
