<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced CSS Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1 class="logo">LEARN CSS </h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Modern CSS Features</h2>
        <p>Hover, focus, transitions, animations and more!</p>
        <button class="btn">Explore</button>
    </section>

    <section class="cards">
        <div class="card">
            <h3>Card One</h3>
            <p>This card uses hover transform and transition.</p>
        </div>

        <div class="card">
            <h3>Card Two</h3>
            <p>This card demonstrates pseudo-elements.</p>
        </div>

        <div class="card">
            <h3>Card Three</h3>
            <p>This card includes animation effects.</p>
        </div>
    </section>

    <section class="form-section">
        <h2>Contact Us</h2>
        <form>
            <input type="text" placeholder="Enter your name">
            <input type="email" placeholder="Enter your email">
            <button type="submit" class="btn">Submit</button>
        </form>
    </section>

</body>
</html>
