<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <h1>
      Create a webpage that includes at least two hyperlinks using &lt;a&gt; tag. One
      link should open in the same tab and the other should open in a new tab
    </h1>
    <hr />
    <br />
    
    <ul>
      <li>
        <a href="https:/google.com" target="_self">Google(self tab)</a>
      </li>
      <li>
        <a href="https:/youtube.com" target="_blank">Youtube(new tab)</a>
      </li>
    </ul>
  </body>
</html>
