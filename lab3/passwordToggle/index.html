<!-- Design and develop a simple webpage that contains a password input field along
with a “Show / Hide” toggle button. When the user clicks the button, the
password should dynamically switch between hidden (password type) and visible
(text type). At the same time, the button text should update accordingly (e.g.,
display “Show” when the password is hidden and “Hide” when it is visible). -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
    <body>
        <div class="whole-wrapper">
   <h2>Password Show / Hide Toggle</h2>
        <div class="wrapper">
         <input type="password" id="password"> 
         <button id="toggle-password"><img src="hidden.png" alt="hide" id="img"  ></button>
    
</div>
<p id="status">Password is hidden</p>


        </div>
        
     
   
  </body>
</html>
